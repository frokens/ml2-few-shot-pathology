run_name: scheme03_pseudolabel_main4
seed: 2026
class_names: [Class_0, Class_1, Class_2, Class_3, Class_4]

teacher_oof_csv: teacher_oof_predictions.csv
teacher_test_csv: teacher_test_predictions.csv

precision_target: 0.95
precision_lower_bound_target: 0.80
min_selected: 1
min_selected_per_class: 1
per_class_policy: true
min_teacher_agreement: 0.0

policy_grid:
  prob_top1: [0.85, 0.90, 0.95, 0.98]
  margin: [0.05, 0.10, 0.20, 0.30]
  entropy_max: [0.35, 0.50, 0.75, 1.00]
  quota_per_class: [50, 100, 250, 500, 1000000]
  min_teacher_agreement: [0.0, 0.67, 1.0]

sample_weight:
  min_weight: 0.1
  max_weight: 0.5
  weight_function: linear

# For select-test, prefer the policy produced by the preceding simulate run.
thresholds_from: artifacts/pseudolabels/simulation/thresholds_selected.json
