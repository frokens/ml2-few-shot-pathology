_extends: peft_uni2_scale64_fold0.yaml
run_name: s02a_uni2_scale48_fold0

backbones:
  - key: uni2_h
    backend: timm
    model_name: hf-hub:MahmoodLab/UNI2-h
    lock_key: uni2_h
    input_size: 224
    scale_to: 48
    scale_pad_fill_rgb: [255, 255, 255]
    pretrained: true
    feature_dim: 1536
    model_kwargs:
      img_size: 224
      patch_size: 14
      depth: 24
      num_heads: 24
      init_values: 1.0e-5
      embed_dim: 1536
      mlp_ratio: 5.33334
      num_classes: 0
      no_embed_class: true
      mlp_layer: timm.layers.SwiGLUPacked
      act_layer: torch.nn.SiLU
      reg_tokens: 8
      dynamic_img_size: true

experiments:
  - name: rslora_qkv_proj_r16_no_ema_scale48
    backbone_keys: [uni2_h]
    mode: lora
    batch_size: 16
    head_lr: 0.0005
    adapter_lr: 0.00005
    ema_decay: 0.0
    target_policy: attention_qkv_proj
    lora:
      r: 16
      alpha: 32
      dropout: 0.05
      bias: none
      modules_to_save: [classifier]
      use_rslora: true
