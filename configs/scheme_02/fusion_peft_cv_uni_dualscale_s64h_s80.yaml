_extends: fusion_peft_cv.yaml
run_name: scheme02b_uni_dualscale_s64h_s80_cv

# Feature-level dual-scale UNI probe. This remains one fusion model with one
# classifier head; the two branches expose different scale-calibrated features.
branches:
  - key: uni2_h_s64h
    backend: timm
    model_name: hf-hub:MahmoodLab/UNI2-h
    lock_key: uni2_h
    input_size: 224
    scale_to: 64
    scale_pad_fill_rgb: [255, 255, 255]
    pretrained: true
    feature_dim: 1536
    model_kwargs:
      img_size: 224
      patch_size: 14
      depth: 24
      num_heads: 24
      init_values: 1.0e-5
      embed_dim: 1536
      mlp_ratio: 5.33334
      num_classes: 0
      no_embed_class: true
      mlp_layer: timm.layers.SwiGLUPacked
      act_layer: torch.nn.SiLU
      reg_tokens: 8
      dynamic_img_size: true
  - key: uni2_h_s80
    backend: timm
    model_name: hf-hub:MahmoodLab/UNI2-h
    lock_key: uni2_h
    input_size: 224
    scale_to: 80
    scale_pad_fill_rgb: [255, 255, 255]
    pretrained: true
    feature_dim: 1536
    model_kwargs:
      img_size: 224
      patch_size: 14
      depth: 24
      num_heads: 24
      init_values: 1.0e-5
      embed_dim: 1536
      mlp_ratio: 5.33334
      num_classes: 0
      no_embed_class: true
      mlp_layer: timm.layers.SwiGLUPacked
      act_layer: torch.nn.SiLU
      reg_tokens: 8
      dynamic_img_size: true

adapter_sources:
  uni2_h_s64h:
    source_run: s02a_uni2_scale64_hardw_cv_20260612
    experiment_id: uni2_h__rslora_qkv_proj_r16_no_ema_scale64_hardw
    target_policy: attention_qkv_proj
    checkpoint_name: best_macro_f1.pt
    lora:
      r: 16
      alpha: 32
      dropout: 0.05
      bias: none
      modules_to_save: [classifier]
      use_rslora: true
  uni2_h_s80:
    source_run: s02a_uni2_scale80_cv_20260612
    experiment_id: uni2_h__rslora_qkv_proj_r16_no_ema_scale80
    target_policy: attention_qkv_proj
    checkpoint_name: best_macro_f1.pt
    lora:
      r: 16
      alpha: 32
      dropout: 0.05
      bias: none
      modules_to_save: [classifier]
      use_rslora: true

experiments:
  - name: uni_dualscale_s64h_s80_concat_p32
    composer: concat_linear
    projection_dim: 32
    dropout: 0.5
    weight_decay: 0.05
    adapter_branches: [uni2_h_s64h, uni2_h_s80]
