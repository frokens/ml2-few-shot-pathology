run_name: scheme02_peft_cv
seed: 2026
train_manifest: artifacts/dataset_audit/train_manifest.csv
test_manifest: artifacts/dataset_audit/test_manifest.csv
test_prediction_mode: none
device: cuda
precision: bf16
num_workers: 4
n_splits: 5
batch_size: 8
epochs: 80
head_lr: 0.001
adapter_lr: 0.00005
weight_decay: 0.01
label_smoothing: 0.05
early_stopping_patience: 15
ema_decay: 0.999
max_grad_norm: 1.0
gradient_checkpointing: true

augmentation:
  hflip_prob: 0.5
  vflip_prob: 0.5
  rot90_prob: 0.5
  translate: 0.05
  color_jitter:
    brightness: 0.08
    contrast: 0.08
    saturation: 0.04
    hue: 0.0
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

mixup:
  alpha: 0.0
  probability: 0.0

backbones:
  - key: uni2_h
    backend: timm
    model_name: hf-hub:MahmoodLab/UNI2-h
    lock_key: uni2_h
    input_size: 224
    pretrained: true
    feature_dim: 1536
    model_kwargs:
      img_size: 224
      patch_size: 14
      depth: 24
      num_heads: 24
      init_values: 1.0e-5
      embed_dim: 1536
      mlp_ratio: 5.33334
      num_classes: 0
      no_embed_class: true
      mlp_layer: timm.layers.SwiGLUPacked
      act_layer: torch.nn.SiLU
      reg_tokens: 8
      dynamic_img_size: true
  - key: virchow2
    backend: timm
    model_name: hf-hub:paige-ai/Virchow2
    lock_key: virchow2
    input_size: 224
    pretrained: true
    feature_dim: 2560
    feature_policy: virchow2_official
    model_kwargs:
      mlp_layer: timm.layers.SwiGLUPacked
      act_layer: torch.nn.SiLU
  - key: conch
    backend: conch
    model_name: conch_ViT-B-16
    lock_key: conch
    lock_path: artifacts/model_registry/models.lock.yaml
    input_size: 224
    pretrained: true
    feature_dim: 512
  - key: h_optimus_0
    backend: timm
    model_name: hf-hub:bioptimus/H-optimus-0
    lock_key: h_optimus_0
    input_size: 224
    pretrained: true
    feature_dim: 1536
    model_kwargs:
      num_classes: 0
      init_values: 1.0e-5
      dynamic_img_size: false
    mean: [0.707223, 0.578729, 0.703617]
    std: [0.211883, 0.230117, 0.177517]
experiments:
  - name: head_only_lp
    mode: head_only
    epochs: 40
    batch_size: 12
    head_lr: 0.001
    weight_decay: 0.01
    label_smoothing: 0.0
    early_stopping_patience: 10
    ema_decay: 0.0
  - name: lora_qkv_r8
    mode: lora
    epochs: 80
    batch_size: 8
    head_lr: 0.0005
    adapter_lr: 0.00005
    weight_decay: 0.01
    label_smoothing: 0.05
    target_policy: attention_qkv
    lora:
      r: 8
      alpha: 16
      dropout: 0.05
      bias: none
      modules_to_save: [classifier]
  - name: lora_qkv_proj_r16
    mode: lora
    epochs: 80
    batch_size: 8
    head_lr: 0.0005
    adapter_lr: 0.00005
    weight_decay: 0.01
    label_smoothing: 0.05
    target_policy: attention_qkv_proj
    lora:
      r: 16
      alpha: 32
      dropout: 0.05
      bias: none
      modules_to_save: [classifier]
  - name: lora_qkv_r8_mixup
    mode: lora
    epochs: 80
    batch_size: 8
    head_lr: 0.0005
    adapter_lr: 0.00005
    weight_decay: 0.01
    label_smoothing: 0.05
    target_policy: attention_qkv
    mixup:
      alpha: 0.2
      probability: 0.5
    lora:
      r: 8
      alpha: 16
      dropout: 0.05
      bias: none
      modules_to_save: [classifier]
