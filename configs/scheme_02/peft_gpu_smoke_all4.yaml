run_name: scheme02_gpu_smoke_all4
seed: 2026
train_manifest: artifacts/dataset_audit/train_manifest.csv
test_manifest: artifacts/dataset_audit/test_manifest.csv
test_prediction_mode: none
device: cuda
precision: bf16
num_workers: 2
n_splits: 5
max_folds: 1
batch_size: 2
epochs: 1
head_lr: 0.001
adapter_lr: 0.00005
weight_decay: 0.01
label_smoothing: 0.0
early_stopping_patience: 0
ema_decay: 0.0
max_grad_norm: 1.0
gradient_checkpointing: true
max_train_batches: 2
max_eval_batches: 2

augmentation:
  hflip_prob: 0.5
  vflip_prob: 0.5
  rot90_prob: 0.5
  translate: 0.03
  color_jitter:
    brightness: 0.04
    contrast: 0.04
    saturation: 0.02
    hue: 0.0
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

mixup:
  alpha: 0.0
  probability: 0.0

backbones:
  - key: uni2_h
    backend: timm
    model_name: hf-hub:MahmoodLab/UNI2-h
    lock_key: uni2_h
    input_size: 224
    pretrained: true
    feature_dim: 1536
    model_kwargs:
      img_size: 224
      patch_size: 14
      depth: 24
      num_heads: 24
      init_values: 1.0e-5
      embed_dim: 1536
      mlp_ratio: 5.33334
      num_classes: 0
      no_embed_class: true
      mlp_layer: timm.layers.SwiGLUPacked
      act_layer: torch.nn.SiLU
      reg_tokens: 8
      dynamic_img_size: true
  - key: virchow2
    backend: timm
    model_name: hf-hub:paige-ai/Virchow2
    lock_key: virchow2
    input_size: 224
    pretrained: true
    feature_dim: 2560
    feature_policy: virchow2_official
    model_kwargs:
      mlp_layer: timm.layers.SwiGLUPacked
      act_layer: torch.nn.SiLU
  - key: conch
    backend: conch
    model_name: conch_ViT-B-16
    lock_key: conch
    lock_path: artifacts/model_registry/models.lock.yaml
    input_size: 224
    pretrained: true
    feature_dim: 512
  - key: h_optimus_0
    backend: timm
    model_name: hf-hub:bioptimus/H-optimus-0
    lock_key: h_optimus_0
    input_size: 224
    pretrained: true
    feature_dim: 1536
    model_kwargs:
      num_classes: 0
      init_values: 1.0e-5
      dynamic_img_size: false
    mean: [0.707223, 0.578729, 0.703617]
    std: [0.211883, 0.230117, 0.177517]

experiments:
  - name: head_only_smoke
    mode: head_only
    epochs: 1
    batch_size: 2
  - name: lora_qkv_r4_smoke
    mode: lora
    epochs: 1
    batch_size: 1
    target_policy: attention_qkv
    lora:
      r: 4
      alpha: 8
      dropout: 0.0
      bias: none
      modules_to_save: [classifier]
